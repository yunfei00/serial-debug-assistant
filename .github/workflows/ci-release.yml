name: CI 与发布

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: 代码检查与构建
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 语法检查
        run: python -m compileall app main.py

  release:
    name: Tag 自动发布
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成源码压缩包
        run: |
          git archive --format=zip --output serial-debug-assistant-${{ github.ref_name }}.zip HEAD

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: serial-debug-assistant-${{ github.ref_name }}.zip
          generate_release_notes: true

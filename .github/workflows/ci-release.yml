name: CI 与发布

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 语法检查
        run: python -m compileall app main.py

  build-windows:
    name: Windows 打包
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖和打包工具
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 生成压缩包名称
        shell: pwsh
        run: |
          $safeRef = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '-'
          if ([string]::IsNullOrWhiteSpace($safeRef)) {
            $safeRef = "${{ github.run_number }}"
          }
          $packageName = "serial-debug-assistant-$safeRef-windows.zip"
          "PACKAGE_PATH=release/$packageName" >> $env:GITHUB_ENV

      - name: 构建 EXE
        run: pyinstaller --name serial-debug-assistant --noconfirm --clean --windowed --onefile main.py

      - name: 压缩 EXE
        shell: pwsh
        run: |
          $exePath = "dist/serial-debug-assistant.exe"
          if (!(Test-Path $exePath)) {
            throw "未找到打包后的 EXE：$exePath"
          }
          New-Item -ItemType Directory -Force -Path package, release | Out-Null
          Copy-Item $exePath "package/serial-debug-assistant.exe" -Force
          Compress-Archive -Path "package/serial-debug-assistant.exe" -DestinationPath $env:PACKAGE_PATH -Force

      - name: 验证压缩包包含 EXE
        shell: pwsh
        run: |
          $verifyDir = Join-Path $env:RUNNER_TEMP "verify-package"
          if (Test-Path $verifyDir) {
            Remove-Item -LiteralPath $verifyDir -Recurse -Force
          }
          Expand-Archive -Path $env:PACKAGE_PATH -DestinationPath $verifyDir -Force
          $exePath = Join-Path $verifyDir "serial-debug-assistant.exe"
          if (!(Test-Path $exePath)) {
            throw "压缩包中未找到 serial-debug-assistant.exe"
          }
          $exe = Get-Item $exePath
          if ($exe.Length -le 0) {
            throw "serial-debug-assistant.exe 文件为空"
          }
          Write-Host "已验证压缩包包含 EXE：$($exe.FullName) ($($exe.Length) bytes)"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: serial-debug-assistant-windows
          path: release/*.zip

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
